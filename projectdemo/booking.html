<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trip Booking</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>
.place-img{
height:180px;
object-fit:cover;
}
</style>

</head>

<body>

<nav class="navbar navbar-dark bg-primary px-4">
<span class="navbar-brand fw-bold">Incredible India Tours</span>
</nav>

<div class="container py-4">

<h2 class="text-center text-primary mb-4" id="tripName"></h2>

<!-- Main Tour Image -->
<img id="mainImage" class="img-fluid rounded shadow mb-4">

<h4 class="mb-3">Places to Visit</h4>

<div class="row g-3" id="placesContainer"></div>

<hr class="my-4">

<div class="row">

<div class="col-md-6">

<h5>Activities</h5>
<ul id="activities"></ul>

</div>

<div class="col-md-6">

<label class="fw-bold">Travel Date</label>
<input type="date" class="form-control mb-3" id="date">

<label class="fw-bold">Extra Options</label>

<div class="form-check">
<input class="form-check-input" type="checkbox" value="2000" onchange="updatePrice()">
<label class="form-check-label">Luxury Hotel (+₹2000)</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" value="1500" onchange="updatePrice()">
<label class="form-check-label">Tour Guide (+₹1500)</label>
</div>

<div class="form-check mb-3">
<input class="form-check-input" type="checkbox" value="3000" onchange="updatePrice()">
<label class="form-check-label">Adventure Activities (+₹3000)</label>
</div>

<h5>Total Price: ₹<span id="price"></span></h5>

<button class="btn btn-success w-100 mt-3" onclick="payNow()">
Proceed to Payment
</button>

</div>

</div>

</div>

<script>

let basePrice=0;

const trips={

taj:{
name:"Taj Mahal Tour",
price:12000,
image:"taj.jpg",
places:[
{name:"Taj Mahal",img:"taj.jpg"},
{name:"Agra Fort",img:"agrafort.jpg"},
{name:"Mehtab Bagh",img:"mehtabbagh.jpg"}
],
activities:["Heritage Walk","Photography","Local Shopping"]
},

goa:{
name:"Goa Tour",
price:22000,
image:"goa.jpg",
places:[
{name:"Baga Beach",img:"baga.jpg"},
{name:"Calangute Beach",img:"calangute.jpg"},
{name:"Fort Aguada",img:"goa.jpg"}
],
activities:["Beach Fun","Water Sports","Nightlife"]
},

ladakh:{
name:"Leh Ladakh Adventure",
price:35000,
image:"ladakh.jpg",
places:[
{name:"Pangong Lake",img:"pangong.jpg"},
{name:"Nubra Valley",img:"nubra.jpg"},
{name:"Thiksey",img:"thiksey.jpg"},
],
activities:["Bike Ride","Camping","Mountain Trek"]
},

delhi:{
name:"Delhi Tour",
price:15000,
image:"delhi.jpg",
places:[
{name:"Lotus temple",img:"lotus.jpg"},
{name:"Red Fort",img:"redfort.jpg"},
{name:"Qutub Minar",img:"qutub.jpg"}
],
activities:["City Tour","Street Food","Shopping"]
},

jaipur:{
name:"Jaipur Tour",
price:18000,
image:"jaipur.jpg",
places:[
{name:"Amber Fort",img:"amber.jpg"},
{name:"Hawa Mahal",img:"hawamahal.jpg"},
{name:"Rambagh Palace",img:"rambagh.jpg"},
],
activities:["Heritage Walk","Shopping"]
},

munnar:{
name:"Munnar Tour",
price:15000,
image:"munnar.jpg",
places:[
{name:"Tea Gardens",img:"teagarden.jpg"},
{name:"Mattupetty Dam",img:"mattupetty.jpg"},
{name:"Attukad Waterfalls",img:"attukad.jpg"},
],
activities:["Nature Walk","Boating"]
},

manali:{
name:"Manali Hill Station",
price:20000,
image:"manali.jpg",

places:[
{name:"Solang Valley",img:"solang.jpg"},
{name:"Rohtang Pass",img:"rohtang.jpg"},
{name:"Hadimba Temple",img:"hadimba.jpg"}
],

activities:["Snow Adventure","Paragliding","Mountain Trek"]
},

rishikesh:{
name:"Rishikesh Adventure",
price:16000,
image:"rishikesh.jpg",

places:[
{name:"Laxman Jhula",img:"laxmanjhula.jpg"},
{name:"Ram Jhula",img:"ramjhula.jpg"},
{name:"Ganga River",img:"ganga.jpg"}
],


activities:["River Rafting","Yoga","Camping"]
},

varanasi:{
name:"Varanasi Spiritual Tour",
price:13000,
image:"varanasi.jpg",

places:[
{name:"Kashi Vishwanath Temple",img:"kashi.jpg"},
{name:"Dashashwamedh Ghat",img:"ghat.jpg"},
{name:"Ganga Aarti",img:"aarti.jpg"}
],

activities:["Temple Visit","Boat Ride","Evening Aarti"]
},

ooty:{
name:"Ooty Tour",
price:14000,
image:"ooty.jpg",

places:[
{name:"Ooty Lake",img:"ootylake.jpg"},
{name:"Botanical Garden",img:"ootylake1.jpg"},
{name:"Doddabetta Peak",img:"doddabetta.jpg"}
],

activities:["Boat Ride","Nature Walk","Photography"]
},

andaman:{
name:"Andaman Islands",
price:32000,
image:"andaman.jpg",

places:[
{name:"Radhanagar Beach",img:"radhanagar.jpg"},
{name:"Cellular Jail",img:"radhanagar1.jpg"},
{name:"Havelock Island",img:"havelock.jpg"}
],

activities:["Scuba Diving","Beach Relax","Boat Ride"]
},

kerala:{
name:"Kerala Backwaters Tour",
price:17000,
image:"kerala.jpg",

places:[
{name:"Alleppey Backwaters",img:"kerala.jpg"},
{name:"Kumarakom Lake",img:"kumarakom.jpg"},
{name:"Houseboat Cruise",img:"houseboat.jpg"}
],

activities:["Houseboat Stay","Boat Ride","Nature Photography"]
},


};

const params=new URLSearchParams(window.location.search);
const tour=params.get("tour");

const trip=trips[tour];

document.getElementById("tripName").innerText=trip.name;
document.getElementById("mainImage").src=trip.image;

basePrice=trip.price;
document.getElementById("price").innerText=basePrice;

/* LOAD PLACES */

trip.places.forEach(place=>{

document.getElementById("placesContainer").innerHTML+=`

<div class="col-md-4">
<div class="card shadow">

<img src="${place.img}" class="card-img-top place-img">

<div class="card-body text-center">
<h6>${place.name}</h6>
</div>

</div>
</div>

`;

});

/* LOAD ACTIVITIES */

trip.activities.forEach(a=>{
document.getElementById("activities").innerHTML+=`<li>${a}</li>`;
});

/* PRICE UPDATE */

function updatePrice(){

let total=basePrice;

document.querySelectorAll(".form-check-input:checked").forEach(c=>{
total+=parseInt(c.value);
});

document.getElementById("price").innerText=total;

}

/* PAYMENT */

function payNow(){

if(!document.getElementById("date").value){
alert("Please select travel date");
return;
}

alert("Payment Successful 🎉\nTrip Booked Successfully");

}

</script>

</body>
</html>
