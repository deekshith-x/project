<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">
<span class="navbar-brand fw-bold">Contact Us</span>
</nav>

<section class="container py-5 text-center">

<h2 class="mb-4">Contact Us</h2>

<p>📞 +91 9000600690</p>
<p>📧 incredibleindiatours@gmail.com</p>
<p>📍 Hyderabad, India</p>

</section>

<!-- FEEDBACK FORM -->

<section class="container pb-5">

<h3 class="text-center mb-4">Send Us Your Feedback</h3>

<div class="row justify-content-center">
<div class="col-md-6">

<form>

<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" class="form-control" placeholder="Enter your name" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" placeholder="Enter your email" required>
</div>

<div class="mb-3">
<label class="form-label">Message</label>
<textarea class="form-control" rows="4" placeholder="Write your feedback..." required></textarea>
</div>

<div class="text-center">
<button type="submit" class="btn btn-primary px-4">Submit</button>
</div>

</form>

</div>
</div>

</section>
